const SUPABASE_URL = 'https://dyxxpuirsuqtuehvijdf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8IaNO6bOuQHZdVyAPeP1Qg_sjjcGcVy';
const MAILGUN_KEY  = '445d9949d4e2b6d36db7eea3c3a73421';

// ── SUPABASE HELPER ──
async function sb(path, opts = {}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...(opts.headers || {})
  };
  if (currentSession?.access_token) {
    headers['Authorization'] = `Bearer ${currentSession.access_token}`;

    ...opts,
    headers
  });
  if (!r.ok && r.status !== 200) {
    const text = await r.text().catch(() => '');
    throw new Error(text || r.statusText);
  }
  return r.json().catch(() => ({}));
}

async function sbAuth(path, body) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  return r.json();
}

// ── AUTH ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'fill in both fields'; return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const data = await sbAuth('/token?grant_type=password', { email, password: pass });
    if (data.error) { errEl.textContent = data.error_description || data.error; return; }
    currentSession = data;
    currentUser = data.user;
    bootApp();
  } catch(e) {
    errEl.textContent = 'connection failed';
  } finally {
    btn.disabled = false;
    btn.textContent = 'enter';
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const pass     = document.getElementById('reg-password').value;
  const errEl    = document.getElementById('reg-err');
  const okEl     = document.getElementById('reg-ok');
  errEl.textContent = ''; okEl.textContent = '';
  if (!username || !email || !pass) { errEl.textContent = 'fill in all fields'; return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = '...';

  try {
    const data = await sbAuth('/signup', {
      email, password: pass,
      data: { username, display_name: username }
    });
    if (data.error) { errEl.textContent = data.error_description || data.error; return; }
    okEl.textContent = 'check your email to confirm, then sign in';
    setTimeout(() => showLogin(), 3000);
  } catch(e) {
    errEl.textContent = 'registration failed';
  } finally {
    btn.disabled = false; btn.textContent = 'register';
  }
}

function doLogout() {
  currentSession = null; currentUser = null;
  clearInterval(refreshInterval);
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

function showRegister() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('register-screen').style.display = 'flex';
}
function showLogin() {
  document.getElementById('register-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── BOOT APP ──
function bootApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('register-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  const email = currentUser?.email || '';
  const username = currentUser?.user_metadata?.username || email.split('@')[0];
  document.getElementById('topbar-email').textContent = email;
  document.getElementById('topbar-user').textContent = username;

  loadEmails();
  refreshInterval = setInterval(loadEmails, 15000);
}

// ── LOAD EMAILS ──
async function loadEmails() {
  try {
    let query = `/rest/v1/emails?select=*&order=received_at.desc.nullslast,created_at.desc`;

    // Filter by folder
    if (currentFolder === 'inbox') {
      query += `&folder=eq.inbox&is_deleted=eq.false`;
    } else if (currentFolder === 'sent') {
      query += `&folder=eq.sent&is_deleted=eq.false`;
    } else if (currentFolder === 'trash') {
      query += `&is_deleted=eq.true`;
    } else if (currentFolder === 'unread') {
      query += `&is_read=eq.false&is_deleted=eq.false`;
    } else if (currentFolder === 'starred') {
      query += `&is_starred=eq.true&is_deleted=eq.false`;
    }

    const data = await sb(query, {
      headers: { 'Prefer': 'return=representation' }
    });
    emails = Array.isArray(data) ? data : [];
    renderEmailList(emails);
    updateUnreadCount();
  } catch(e) {
    // Table might not exist yet, show empty
    emails = [];
    renderEmailList([]);
  }
}

function renderEmailList(list) {
  const el = document.getElementById('email-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><p>no mail</p></div>`;
    return;
  }
  el.innerHTML = list.map(e => {
    const from = e.from_address || e.from_name || 'unknown';
    const subject = e.subject || '(no subject)';
    const preview = stripHtml(e.body_text || e.body_html || '');
    const date = formatDate(e.received_at || e.created_at);
    const isUnread = !e.is_read;
    const isActive = currentEmail?.id === e.id;
    return `<div class="email-item ${isUnread ? 'unread' : ''} ${isActive ? 'active' : ''}"
               onclick="openEmail('${e.id}')"
               data-id="${e.id}">
      <div class="email-meta">
        <div class="email-from">${esc(truncate(from, 28))}</div>
        <div class="email-time">${date}</div>
      </div>
      <div class="email-subject">${esc(truncate(subject, 36))}</div>
      <div class="email-preview">${esc(truncate(preview, 55))}</div>
    </div>`;
  }).join('');
}

function filterEmails(q) {
  q = q.toLowerCase();
  const filtered = emails.filter(e =>
    (e.from_address || '').toLowerCase().includes(q) ||
    (e.from_name || '').toLowerCase().includes(q) ||
    (e.subject || '').toLowerCase().includes(q) ||
    (e.body_text || '').toLowerCase().includes(q)
  );
  renderEmailList(filtered);
}

// ── OPEN EMAIL ──
async function openEmail(id) {
  const email = emails.find(e => e.id === id);
  if (!email) return;
  currentEmail = email;

  // Mark active in list
  document.querySelectorAll('.email-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`)?.classList.add('active');

  // Show detail
  document.getElementById('detail-empty').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'flex';

  document.getElementById('detail-subject').textContent = email.subject || '(no subject)';
  document.getElementById('detail-from').textContent = email.from_address || email.from_name || 'unknown';
  document.getElementById('detail-to').textContent = email.to_address || currentUser?.email || '';
  document.getElementById('detail-date').textContent = formatDateTime(email.received_at || email.created_at);

  // Star state
  const btnStar = document.getElementById('btn-star');
  btnStar.textContent = email.is_starred ? '★' : '☆';
  btnStar.style.color = email.is_starred ? 'rgba(255,200,50,0.8)' : '';

  // Body
  const body = document.getElementById('detail-body');
  if (email.body_html) {
    body.innerHTML = `<div class="detail-body-html">${sanitizeHtml(email.body_html)}</div>`;
  } else {
    body.innerHTML = `<div class="detail-body-text">${esc(email.body_text || '(empty)')}</div>`;
  }

  // Pre-fill reply
  document.getElementById('reply-text').value = '';
  document.getElementById('reply-text').placeholder = `reply to ${email.from_address || ''}...`;

  // Mark as read
  if (!email.is_read) {
    email.is_read = true;
    try {
      await sb(`/rest/v1/emails?id=eq.${id}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify({ is_read: true })
      });
      // Update in list
      document.querySelector(`[data-id="${id}"]`)?.classList.remove('unread');
      updateUnreadCount();
    } catch(e) {}
  }
}

function closeDetail() {
  currentEmail = null;
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('detail-empty').style.display = 'flex';
  document.querySelectorAll('.email-item').forEach(el => el.classList.remove('active'));
}

// ── STAR / TRASH ──
async function toggleStar() {
  if (!currentEmail) return;
  currentEmail.is_starred = !currentEmail.is_starred;
  const btnStar = document.getElementById('btn-star');
  btnStar.textContent = currentEmail.is_starred ? '★' : '☆';
  btnStar.style.color = currentEmail.is_starred ? 'rgba(255,200,50,0.8)' : '';
  try {
    await sb(`/rest/v1/emails?id=eq.${currentEmail.id}`, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_starred: currentEmail.is_starred })
    });
  } catch(e) {}
}

async function moveToTrash() {
  if (!currentEmail) return;
  try {
    await sb(`/rest/v1/emails?id=eq.${currentEmail.id}`, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_deleted: true })
    });
    toast('moved to trash');
    closeDetail();
    loadEmails();
  } catch(e) { toast('error', true); }
}

async function markAllRead() {
  try {
    await sb(`/rest/v1/emails?is_read=eq.false&is_deleted=eq.false`, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ is_read: true })
    });
    emails.forEach(e => e.is_read = true);
    renderEmailList(emails);
    updateUnreadCount();
  } catch(e) {}
}

// ── FOLDER NAV ──
function setFolder(folder) {
  currentFolder = folder;
  closeDetail();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${folder}`)?.classList.add('active');
  document.getElementById('pane-title').textContent = folder;
  document.getElementById('search-input').value = '';
  document.getElementById('email-list').innerHTML = `<div class="empty-state"><div class="loader"></div></div>`;
  loadEmails();
}

function updateUnreadCount() {
  const count = emails.filter(e => !e.is_read && !e.is_deleted).length;
  const el = document.getElementById('unread-count');
  el.textContent = count > 0 ? count : '';
}

function refreshEmails() {
  document.getElementById('email-list').innerHTML = `<div class="empty-state"><div class="loader"></div></div>`;
  loadEmails();
}

// ── COMPOSE ──
function openCompose() {
  document.getElementById('compose-modal').style.display = 'flex';
  document.getElementById('compose-to').value = '';
  document.getElementById('compose-subject').value = '';
  document.getElementById('compose-body').value = '';
  document.getElementById('compose-status').textContent = '';
  document.getElementById('compose-to').focus();
}
function closeCompose() {
  document.getElementById('compose-modal').style.display = 'none';
}

async function sendCompose() {
  const to      = document.getElementById('compose-to').value.trim();
  const subject = document.getElementById('compose-subject').value.trim();
  const body    = document.getElementById('compose-body').value.trim();
  const status  = document.getElementById('compose-status');
  if (!to || !body) { status.textContent = 'to and body required'; return; }

  status.textContent = 'sending...';
  const fromEmail = currentUser?.email || 'noreply@wimp.best';

  try {
    // Send via Mailgun
    const formData = new FormData();
    formData.append('from', fromEmail);
    formData.append('to', to);
    formData.append('subject', subject || '(no subject)');
    formData.append('text', body);

    const mgRes = await fetch(`https://api.mailgun.net/v3/wimp.best/messages`, {
      method: 'POST',
      headers: {
        'Authorization': 'Basic ' + btoa('api:' + MAILGUN_KEY)
      },
      body: formData
    });

    // Save to sent in Supabase regardless of Mailgun result
    await sb('/rest/v1/emails', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: currentUser?.id,
        from_address: fromEmail,
        from_name: currentUser?.user_metadata?.username || '',
        to_address: to,
        subject: subject || '(no subject)',
        body_text: body,
        folder: 'sent',
        is_read: true,
        is_deleted: false,
        is_starred: false,
        received_at: new Date().toISOString()
      })
    });

    status.textContent = 'sent!';
    toast('message sent');
    setTimeout(closeCompose, 1500);
    if (currentFolder === 'sent') loadEmails();
  } catch(e) {
    status.textContent = 'failed to send';
    toast('send failed', true);
  }
}

// ── REPLY ──
async function sendReply() {
  if (!currentEmail) return;
  const body = document.getElementById('reply-text').value.trim();
  if (!body) return;

  const fromEmail = currentUser?.email || 'noreply@wimp.best';
  const to = currentEmail.from_address || '';

  try {
    const formData = new FormData();
    formData.append('from', fromEmail);
    formData.append('to', to);
    formData.append('subject', 'Re: ' + (currentEmail.subject || ''));
    formData.append('text', body);

    await fetch(`https://api.mailgun.net/v3/wimp.best/messages`, {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + btoa('api:' + MAILGUN_KEY) },
      body: formData
    });

    // Save reply to sent
    await sb('/rest/v1/emails', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: currentUser?.id,
        from_address: fromEmail,
        to_address: to,
        subject: 'Re: ' + (currentEmail.subject || ''),
        body_text: body,
        folder: 'sent',
        is_read: true,
        is_deleted: false,
        is_starred: false,
        received_at: new Date().toISOString()
      })
    });

    document.getElementById('reply-text').value = '';
    toast('reply sent');
  } catch(e) {
    toast('reply failed', true);
  }
}

// ── UTILS ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncate(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function sanitizeHtml(html) {
  // Very basic sanitization - remove scripts
  return html.replace(/<script[\s\S]*?<\/script>/gi, '')
             .replace(/on\w+="[^"]*"/gi, '')
             .replace(/javascript:/gi, '');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }
  const diff = (now - d) / 86400000;
  if (diff < 7) {
    return d.toLocaleDateString([], {weekday:'short'});
  }
  return d.toLocaleDateString([], {month:'short', day:'numeric'});
}

function formatDateTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString([], {
    month:'short', day:'numeric', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${isErr ? 'err' : 'ok'}`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('compose-modal').style.display !== 'none') closeCompose();
    else closeDetail();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    openCompose();
  }
});

document.querySelectorAll('#auth-screen input, #register-screen input').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('auth-screen').style.display !== 'none') doLogin();
      else doRegister();
    }
  });
});
