<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mail.wimp.best — secure onion inbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #000000;
      color: #eef2ff;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      font-size: 12px;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    a { color: rgba(255,255,255,0.35); text-decoration: none; transition: 0.2s; }
    a:hover { color: rgba(255,255,255,0.7); }

    /* ----- AUTH / REGISTER SCREENS (dark minimal) ----- */
    #auth-screen, #register-screen {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 20%, #0a0a0c, #000000);
    }

    .auth-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 300px;
      background: rgba(6, 6, 8, 0.65);
      backdrop-filter: blur(8px);
      padding: 32px 28px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }

    .auth-title {
      font-size: 12px;
      letter-spacing: 8px;
      text-transform: uppercase;
      opacity: 0.5;
      font-weight: 300;
      margin-bottom: 4px;
    }

    .auth-field {
      width: 100%;
      position: relative;
    }

    .auth-field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.2px solid rgba(255,255,255,0.12);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 0;
      outline: none;
      text-align: center;
      letter-spacing: 1px;
      transition: border-color 0.2s;
    }

    .auth-field input:focus {
      border-bottom-color: rgba(255,255,255,0.4);
    }

    .auth-field input::placeholder {
      color: rgba(255,255,255,0.12);
      letter-spacing: 1px;
    }

    .field-line {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 1px;
      background: rgba(255,255,255,0.6);
      transition: width 0.3s, left 0.3s;
    }

    .auth-field input:focus ~ .field-line {
      width: 100%;
      left: 0;
    }

    .auth-links {
      font-size: 10px;
      letter-spacing: 2px;
      opacity: 0.4;
    }

    .err {
      font-size: 10px;
      color: rgba(255, 90, 90, 0.8);
      letter-spacing: 1px;
      text-align: center;
      min-height: 20px;
    }

    .ok {
      font-size: 10px;
      color: rgba(100, 255, 140, 0.8);
      text-align: center;
    }

    .btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 10px 26px;
      cursor: pointer;
      transition: all 0.25s ease;
      border-radius: 40px;
    }

    .btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.02);
    }

    .btn-sm {
      padding: 6px 16px;
      font-size: 9px;
      letter-spacing: 2px;
      border-radius: 30px;
    }

    .btn-primary {
      border-color: rgba(100, 120, 255, 0.35);
      color: rgba(100, 150, 255, 0.8);
    }

    .btn-primary:hover {
      border-color: rgba(100, 150, 255, 0.7);
      color: #adc6ff;
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 12px;
      padding: 4px 8px;
      transition: 0.2s;
    }

    .btn-icon:hover {
      color: rgba(255,255,255,0.8);
    }

    /* ----- MAIN APP (DARK LAYOUT) ----- */
    #app {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: #000000;
    }

    .topbar {
      height: 48px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      flex-shrink: 0;
      background: #010101;
    }

    .topbar-logo {

      letter-spacing: 7px;
      text-transform: uppercase;

    }

    .topbar-email {

      letter-spacing: 1px;

    .live-dot {

    .main {

    }

    /* Sidebar */
    .sidebar {
      width: 210px;
      border-right: 1px solid rgba(255,255,255,0.04);

      flex-direction: column;
      padding: 20px 12px;
      flex-shrink: 0;
      background: #010101;
    }

    .compose-btn {
      background: rgba(255,255,255,0.02);

    .compose-btn:hover {

    .nav-item {

    .nav-item:hover {

    /* email list panel */
    .email-list-pane {
      width: 340px;
      border-right: 1px solid rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;

    }

    .pane-header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.04);

    }

    .pane-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;

    }

    .search-bar {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .search-bar input {

    .email-list {

    .email-item {

    .email-item:hover {

    .email-meta {
      display: flex;

    .email-time {

      color: rgba(255,255,255,0.2);

    /* detail panel */
    .detail-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000000;
    }

    .detail-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.2;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .detail-header {
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .detail-subject {
      font-size: 15px;
      font-weight: 450;
      margin-bottom: 10px;
    }

    .detail-meta-row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .detail-body-text {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .reply-area {
      border-top: 1px solid rgba(255,255,255,0.04);
      padding: 16px 24px;
      background: #010101;
    }

    .reply-area textarea {
      width: 100%;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      color: #ddd;
      font-family: inherit;
      font-size: 12px;
      padding: 12px;
      resize: vertical;
      outline: none;
    }

    /* modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal {
      background: #0b0b0e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      width: 540px;
      max-width: 90vw;
    }

    .modal-header {
      padding: 16px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 3px;
    }

    .modal-field {
      padding: 12px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      gap: 12px;
    }

    .modal-field label {
      width: 45px;
      opacity: 0.5;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .modal-field input, .modal-body textarea {
      background: transparent;
      border: none;
      color: white;
      font-family: inherit;
      flex: 1;
      outline: none;
    }

    .modal-body textarea {
      width: 100%;
      min-height: 160px;
      padding: 8px 0;
      resize: vertical;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #111215;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 20px;
      font-size: 10px;
      letter-spacing: 2px;
      border-radius: 40px;
      transition: 0.2s;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-top-color: #8892ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 10px;
      opacity: 0.3;
    }
  </style>
</head>

<script>
  // CONFIGURATION
  const SUPABASE_URL = 'https://dyxxpuirsuqtuehvijdf.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8IaNO6bOuQHZdVyAPeP1Qg_sjjcGcVy';
  const MAILGUN_KEY  = '445d9949d4e2b6d36db7eea3c3a73421';
  const MAILGUN_DOMAIN = 'wimp.best';

  let currentSession = null;
  let currentUser = null;
  let emails = [];
  let currentEmailObj = null;
  let currentFolder = 'inbox';
  let refreshInterval = null;

  // Helper: get user email (username@wimp.best)
  function getUserEmailFromMeta() {
    if (!currentUser) return '';
    const username = currentUser.user_metadata?.username || (currentUser.email ? currentUser.email.split('@')[0] : 'user');
    return `${username}@${MAILGUN_DOMAIN}`;
  }

  // Supabase REST wrapper
  async function sbReq(path, opts = {}) {
    const headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' };
    if (currentSession?.access_token) headers['Authorization'] = `Bearer ${currentSession.access_token}`;
    const res = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers });
    if (!res.ok && res.status !== 200 && res.status !== 204) throw new Error(await res.text());
    if (res.status === 204) return {};
    return res.json();
  }

  async function sbAuth(path, body) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1${path}`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  }

  // AUTH LOGIC
  async function doLogin() {
    let raw = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    const errDiv = document.getElementById('login-err');
    if (!raw || !pass) { errDiv.innerText = 'fill both fields'; return; }
    let email = raw.includes('@') ? raw : `${raw}@${MAILGUN_DOMAIN}`;
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.innerText = '...';
    try {
      const data = await sbAuth('/token?grant_type=password', { email, password: pass });
      if (data.error) { errDiv.innerText = data.error_description || 'auth failed'; return; }
      currentSession = data;
      currentUser = data.user;
      startApp();
    } catch(e) { errDiv.innerText = 'connection error'; }
    finally { btn.disabled = false; btn.innerText = '➤ enter'; }
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const pass = document.getElementById('reg-password').value;
    const errDiv = document.getElementById('reg-err');
    const okDiv = document.getElementById('reg-ok');
    errDiv.innerText = ''; okDiv.innerText = '';
    if (!username || !pass) { errDiv.innerText = 'username & password required'; return; }
    if (!/^[a-zA-Z0-9][a-zA-Z0-9._-]{2,30}$/.test(username)) { errDiv.innerText = 'username 3-30 chars (letters, numbers, . - _)'; return; }
    const email = `${username}@${MAILGUN_DOMAIN}`;
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.innerText = '...';
    try {
      const data = await sbAuth('/signup', { email, password: pass, data: { username, display_name: username, onion_email: email } });
      if (data.error) { errDiv.innerText = data.error_description || 'signup error'; return; }
      okDiv.innerText = '✅ verification email sent! confirm then login.';
      setTimeout(() => { document.getElementById('register-screen').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; }, 2800);
    } catch(e) { errDiv.innerText = 'signup failed'; }
    finally { btn.disabled = false; btn.innerText = 'register'; }
  }

  function logout() { if (refreshInterval) clearInterval(refreshInterval); currentSession = null; currentUser = null; document.getElementById('app').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('login-password').value = ''; }

  // core email loading
  async function loadEmails() {
    if (!currentSession) return;
    try {
      let query = `/rest/v1/emails?select=*&order=received_at.desc.nullslast,created_at.desc`;
      if (currentFolder === 'inbox') query += `&folder=eq.inbox&is_deleted=eq.false`;
      else if (currentFolder === 'sent') query += `&folder=eq.sent&is_deleted=eq.false`;
      else if (currentFolder === 'trash') query += `&is_deleted=eq.true`;
      else if (currentFolder === 'unread') query += `&is_read=eq.false&is_deleted=eq.false`;
      else if (currentFolder === 'starred') query += `&is_starred=eq.true&is_deleted=eq.false`;
      const data = await sbReq(query);
      emails = Array.isArray(data) ? data : [];
      renderEmailList();
      updateUnreadBadge();
    } catch(e) { emails = []; renderEmailList(); }
  }

  function renderEmailList() {
    const container = document.getElementById('email-list');
    const search = document.getElementById('search-input').value.toLowerCase();
    let filtered = emails.filter(e => (e.subject || '').toLowerCase().includes(search) || (e.from_address || '').toLowerCase().includes(search));
    if (!filtered.length) { container.innerHTML = `<div class="empty-state"><p>📭 no messages</p></div>`; return; }
    container.innerHTML = filtered.map(e => {
      const unreadClass = (!e.is_read && currentFolder !== 'sent') ? 'unread' : '';
      const activeClass = (currentEmailObj && currentEmailObj.id === e.id) ? 'active' : '';
      return `<div class="email-item ${unreadClass} ${activeClass}" data-id="${e.id}">
        <div class="email-meta"><div class="email-from">${escapeHtml(e.from_address || 'anon')}</div><div class="email-time">${formatTime(e.received_at || e.created_at)}</div></div>
        <div class="email-subject">${escapeHtml(e.subject || '(no subject)')}</div>
      </div>`;
    }).join('');
    document.querySelectorAll('.email-item').forEach(el => el.addEventListener('click', () => openEmailById(el.getAttribute('data-id'))));
  }

  async function openEmailById(id) {
    const email = emails.find(e => e.id === id);
    if (!email) return;
    currentEmailObj = email;
    if (!email.is_read && currentFolder !== 'sent') {
      await sbReq(`/rest/v1/emails?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ is_read: true }) });
      email.is_read = true;
      renderEmailList();
      updateUnreadBadge();
    }
    document.getElementById('detail-empty').style.display = 'none';
    const dv = document.getElementById('detail-view');
    dv.style.display = 'flex';
    document.getElementById('detail-subject').innerText = email.subject || '(no subject)';
    document.getElementById('detail-from').innerText = email.from_address || 'unknown';
    document.getElementById('detail-date').innerText = new Date(email.received_at || email.created_at).toLocaleString();
    document.getElementById('detail-body').innerHTML = `<div class="detail-body-text">${escapeHtml(email.body_text || (email.body_html ? stripHtml(email.body_html) : '✨ empty message'))}</div>`;
    const starBtn = document.getElementById('star-detail-btn');
    starBtn.innerText = email.is_starred ? '★' : '☆';
    starBtn.onclick = async () => { const newStar = !email.is_starred; await sbReq(`/rest/v1/emails?id=eq.${email.id}`, { method: 'PATCH', body: JSON.stringify({ is_starred: newStar }) }); email.is_starred = newStar; starBtn.innerText = newStar ? '★' : '☆'; renderEmailList(); };
    document.getElementById('trash-detail-btn').onclick = async () => { await sbReq(`/rest/v1/emails?id=eq.${email.id}`, { method: 'PATCH', body: JSON.stringify({ is_deleted: true }) }); toastMsg('moved to trash'); closeDetail(); loadEmails(); };
    document.getElementById('send-reply-btn').onclick = async () => { const reply = document.getElementById('reply-textarea').value.trim(); if (!reply) return; await sendMail(email.from_address, `Re: ${email.subject || ''}`, reply); toastMsg('reply sent'); document.getElementById('reply-textarea').value = ''; };
  }

  async function sendMail(to, subject, bodyText) {
    const fromEmail = getUserEmailFromMeta();
    const form = new FormData(); form.append('from', fromEmail); form.append('to', to); form.append('subject', subject); form.append('text', bodyText);
    await fetch(`https://api.mailgun.net/v3/${MAILGUN_DOMAIN}/messages`, { method: 'POST', headers: { 'Authorization': 'Basic ' + btoa('api:' + MAILGUN_KEY) }, body: form });
    await sbReq('/rest/v1/emails', { method: 'POST', body: JSON.stringify({ user_id: currentUser.id, from_address: fromEmail, to_address: to, subject, body_text: bodyText, folder: 'sent', is_read: true, received_at: new Date().toISOString() }) });
    if (currentFolder === 'sent') loadEmails();
  }

  async function sendCompose() { const to = document.getElementById('compose-to').value.trim(); const subj = document.getElementById('compose-subject').value.trim() || '(no subject)'; const body = document.getElementById('compose-body').value.trim(); if (!to || !body) { document.getElementById('compose-status').innerText = 'to & body required'; return; } document.getElementById('compose-status').innerText = 'sending...'; try { await sendMail(to, subj, body); document.getElementById('compose-status').innerText = '✓ sent'; toastMsg('message sent'); setTimeout(() => closeComposeModal(), 1300); } catch(e) { document.getElementById('compose-status').innerText = 'failed'; toastMsg('send error', true); } }

  function closeDetail() { currentEmailObj = null; document.getElementById('detail-view').style.display = 'none'; document.getElementById('detail-empty').style.display = 'flex'; }
  function setFolder(folder) { currentFolder = folder; closeDetail(); document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active')); document.getElementById(`nav-${folder}`).classList.add('active'); document.getElementById('current-folder-label').innerText = folder; loadEmails(); }
  function updateUnreadBadge() { const cnt = emails.filter(e => !e.is_read && !e.is_deleted).length; document.getElementById('inbox-count').innerText = cnt || ''; }
  function toastMsg(msg, isErr=false) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1'; t.style.backgroundColor = isErr ? '#2a1a1a' : '#1a2a1e'; setTimeout(() => t.style.opacity = '0', 2700); }
  function escapeHtml(s) { return String(s || '').replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function stripHtml(html) { const div = document.createElement('div'); div.innerHTML = html; return div.textContent || div.innerText || ''; }
  function formatTime(ts) { if (!ts) return ''; const d = new Date(ts); const now = new Date(); if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); if ((now-d) < 7*86400000) return d.toLocaleDateString([], {weekday:'short'}); return d.toLocaleDateString([], {month:'short', day:'numeric'}); }
  function openComposeModal() { document.getElementById('compose-modal').style.display = 'flex'; document.getElementById('compose-to').value = ''; document.getElementById('compose-subject').value = ''; document.getElementById('compose-body').value = ''; document.getElementById('compose-status').innerText = ''; }
  function closeComposeModal() { document.getElementById('compose-modal').style.display = 'none'; }
  function startApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('register-screen').style.display = 'none'; document.getElementById('app').style.display = 'flex'; document.getElementById('topbar-email').innerText = getUserEmailFromMeta(); loadEmails(); if (refreshInterval) clearInterval(refreshInterval); refreshInterval = setInterval(loadEmails, 13000); }

  // EVENT LISTENERS
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('show-register-link').addEventListener('click', () => { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('register-screen').style.display = 'flex'; });
  document.getElementById('show-login-link').addEventListener('click', () => { document.getElementById('register-screen').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; });
  document.getElementById('reg-btn').addEventListener('click', doRegister);
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('compose-global').addEventListener('click', openComposeModal);
  document.getElementById('send-compose-btn').addEventListener('click', sendCompose);
  document.getElementById('close-modal-btn').addEventListener('click', closeComposeModal);
  document.getElementById('cancel-compose-btn').addEventListener('click', closeComposeModal);
  document.getElementById('close-detail-btn').addEventListener('click', closeDetail);
  document.getElementById('refresh-list').addEventListener('click', () => loadEmails());
  document.getElementById('search-input').addEventListener('input', () => renderEmailList());
  document.querySelectorAll('[data-folder]').forEach(el => el.addEventListener('click', () => setFolder(el.getAttribute('data-folder'))));
  window.addEventListener('keydown', e => { if (e.key === 'Escape') { if (document.getElementById('compose-modal').style.display !== 'none') closeComposeModal(); else closeDetail(); } if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openComposeModal(); } });
</script>
</body>
</html>
